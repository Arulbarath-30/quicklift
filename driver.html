<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Join as Driver - Quick Lift</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-gray-900">

<!-- NAVBAR -->
<nav class="flex justify-between items-center px-6 py-4 bg-black text-white">
<h1 class="text-2xl font-bold">
<span class="text-yellow-400">Quick</span>Lift
</h1>
</nav>

<!-- HERO -->
<section class="text-center py-16">

<h2 class="text-4xl font-bold">
Earn Money with <span class="text-yellow-400">QuickLift</span>
</h2>

<p class="mt-4 text-gray-600">
Join as a driver and start earning daily 🚀
</p>

</section>

<!-- FORM -->
<section class="max-w-xl mx-auto bg-white p-6 rounded-xl shadow-lg">

<h3 class="text-2xl font-semibold mb-4">Driver Registration</h3>

<input id="name" placeholder="Full Name"
class="w-full p-3 mb-4 border rounded">

<input id="phone" placeholder="Phone Number"
class="w-full p-3 mb-4 border rounded">

<input id="vehicle" placeholder="Vehicle Type (Bike/Car/Auto)"
class="w-full p-3 mb-4 border rounded">

<input id="number" placeholder="Vehicle Number"
class="w-full p-3 mb-4 border rounded">

<button onclick="registerDriver()"
class="w-full bg-yellow-400 py-2 rounded font-bold hover:bg-yellow-500">
Join Now
</button>

<p id="msg" class="mt-3 font-semibold"></p>

</section>

<script>
function registerDriver(){

let name = document.getElementById("name").value
let phone = document.getElementById("phone").value
let vehicle = document.getElementById("vehicle").value
let number = document.getElementById("number").value
let msg = document.getElementById("msg")

if(name === "" || phone === "" || vehicle === "" || number === ""){
  msg.textContent = "❌ Fill all fields"
  msg.style.color = "red"
  return
}

msg.textContent = "✅ Registration Successful!"
msg.style.color = "green"

}
</script>

</body>
</html>
