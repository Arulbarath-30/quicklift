<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Quick Lift</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family: 'Poppins', sans-serif;
}
</style>
</head>

<body class="bg-black flex items-center justify-center h-screen">

<!-- BACKGROUND -->
<div class="absolute inset-0 bg-gradient-to-r from-black via-gray-900 to-black"></div>

<!-- CARD -->
<div class="relative z-10 bg-white/10 backdrop-blur-lg border border-white/20 p-8 rounded-2xl w-80 shadow-2xl text-white">

<h1 class="text-yellow-400 text-xl text-center font-bold mb-2">
  Quick<span class="text-white">Lift</span>
</h1>

<h2 class="text-3xl font-bold text-center mb-6">
  Welcome Back 👋
</h2>

<input type="email" placeholder="Email"
class="w-full p-3 mb-4 rounded bg-white/20 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-400">

<input type="password" placeholder="Password" id="password"
class="w-full p-3 mb-2 rounded bg-white/20 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-400">

<div class="flex items-center mb-4 text-sm">
  <input type="checkbox" onclick="togglePassword()" class="mr-2">
  Show Password
</div>

<button class="w-full bg-yellow-400 text-black py-2 rounded font-bold hover:bg-yellow-500 transition hover:scale-105">
  Login
</button>

<p class="text-sm text-center mt-4 text-gray-300">
Don't have an account?
<a href="signup.html" class="text-yellow-400">Sign Up</a>
</p>

</div>

<script>
function togglePassword(){
  let pass = document.getElementById("password")
  pass.type = pass.type === "password" ? "text" : "password"
}
</script>

</body>
</html>
